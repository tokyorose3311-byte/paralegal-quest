version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: 6.1.5+1
  shared_preferences: 2.5.3
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1

  # Firebase (LOCKED versions - do not upgrade)
  firebase_core: 3.6.0
  cloud_firestore: 5.4.3
